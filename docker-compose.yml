services:
  dizzle-store:
    build: .
    container_name: dizzle-store
    ports:
      - "3000:3000"
    volumes:
      - dizzle-data:/app/data
      - dizzle-uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=dizzle2024
      - JWT_SECRET=change-this-secret-in-production
    restart: unless-stopped

volumes:
  dizzle-data:
  dizzle-uploads:
