<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dizzle Store</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
</head>
<body>
  <div id="app">
    <!-- Login Page -->
    <div id="page-login" class="page hidden">
      <div class="login-container">
        <div class="login-logo">
          <span class="logo-icon">🤖</span>
          <h1>Dizzle Store</h1>
          <p>Android App Distribution</p>
        </div>
        <form id="login-form" class="login-form">
          <div class="form-group">
            <label for="username">Benutzername</label>
            <input type="text" id="username" name="username" placeholder="admin" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password">Passwort</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <div id="login-error" class="error-msg hidden"></div>
          <button type="submit" class="btn btn-primary btn-full">
            <span>Anmelden</span>
          </button>
        </form>
      </div>
    </div>

    <!-- Main App -->
    <div id="page-app" class="page hidden">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <span class="logo-icon">🤖</span>
          <span class="logo-text">Dizzle Store</span>
        </div>
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active" data-view="store">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Store
          </a>
          <a href="#" class="nav-item" data-view="admin">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Admin
          </a>
          <a href="#" class="nav-item" data-view="upload">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            App hochladen
          </a>
        </nav>
        <div class="sidebar-footer">
          <button id="logout-btn" class="btn btn-ghost btn-full">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Abmelden
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Store View -->
        <div id="view-store" class="view">
          <div class="view-header">
            <h2>App Store</h2>
            <div class="search-bar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="search-input" placeholder="Apps suchen..." />
            </div>
          </div>
          <div id="apps-grid" class="apps-grid">
            <div class="loading">Apps werden geladen...</div>
          </div>
        </div>

        <!-- Admin View -->
        <div id="view-admin" class="view hidden">
          <div class="view-header">
            <h2>Admin Dashboard</h2>
          </div>
          <div id="stats-cards" class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon">📱</div>
              <div class="stat-info">
                <span class="stat-value" id="stat-apps">–</span>
                <span class="stat-label">Apps</span>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">📦</div>
              <div class="stat-info">
                <span class="stat-value" id="stat-releases">–</span>
                <span class="stat-label">Releases</span>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">⬇️</div>
              <div class="stat-info">
                <span class="stat-value" id="stat-downloads">–</span>
                <span class="stat-label">Downloads</span>
              </div>
            </div>
          </div>

          <div class="section-header">
            <h3>Alle Apps</h3>
            <button class="btn btn-primary" onclick="showView('upload')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Neue App
            </button>
          </div>
          <div id="admin-apps-list" class="admin-list">
            <div class="loading">Wird geladen...</div>
          </div>
        </div>

        <!-- Upload / Create App View -->
        <div id="view-upload" class="view hidden">
          <div class="view-header">
            <h2>Neue App anlegen</h2>
          </div>
          <div class="form-card">
            <form id="create-app-form" enctype="multipart/form-data">
              <div class="form-row">
                <div class="form-group">
                  <label>App Name *</label>
                  <input type="text" name="name" placeholder="z.B. Meine Super App" required />
                </div>
                <div class="form-group">
                  <label>Package Name *</label>
                  <input type="text" name="package_name" placeholder="z.B. com.dizzle.myapp" required />
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Kategorie</label>
                  <select name="category">
                    <option>Other</option>
                    <option>Tools</option>
                    <option>Games</option>
                    <option>Social</option>
                    <option>Productivity</option>
                    <option>Entertainment</option>
                    <option>Finance</option>
                    <option>Health</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>App Icon</label>
                  <div class="file-input-wrapper">
                    <input type="file" name="icon" id="icon-input" accept="image/*" />
                    <label for="icon-input" class="file-label">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                      Bild auswählen
                    </label>
                    <span id="icon-filename">Kein Bild gewählt</span>
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label>Beschreibung</label>
                <textarea name="description" rows="3" placeholder="Beschreibe deine App..."></textarea>
              </div>
              <div id="create-app-error" class="error-msg hidden"></div>
              <div class="form-actions">
                <button type="button" class="btn btn-ghost" onclick="showView('admin')">Abbrechen</button>
                <button type="submit" class="btn btn-primary">App anlegen</button>
              </div>
            </form>
          </div>
        </div>

        <!-- App Detail View -->
        <div id="view-app-detail" class="view hidden">
          <div class="view-header">
            <button class="btn btn-ghost btn-back" onclick="showView('admin')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
              Zurück
            </button>
            <h2 id="detail-app-name">App Details</h2>
          </div>
          <div id="app-detail-content"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
